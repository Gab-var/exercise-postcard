<!DOCTYPE html>
<html>
	<head>
		<link rel="stylesheet" type="text/css" href="styles.css" />
		<link href="https://fonts.googleapis.com/css2?family=Handlee&display=swap" rel="stylesheet" />
		<title>Postal del Bolso</title>
	</head>
	<body>
		<div class="postcard">
			<div class="postcard-header">
				<h1>¡Dale, Bolso!</h1>
				<img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Logo_Club_Nacional_de_Football.png" alt="Escudo Nacional" />
			</div>

			<div class="postcard-body">
				<div class="body-left">
					<p>Una postal desde el Gran Parque Central... El primer estadio Mundialista</p>
					<p>Primer club criollo de america</p>
				</div>
				<div class="body-right">
					<input type="text" placeholder="Tu Nombre" />
					<input type="text" placeholder="Tu Correo" />
					<input type="text" placeholder="Tu Mensaje" />
				</div>
			</div>

			<div class="postcard-footer">
				<button>Enviar Saludo</button>
			</div>
		</div>
	</body>
</html>
